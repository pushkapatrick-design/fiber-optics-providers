<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiber Optics Providers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #sl-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    #sl-stage {
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      position: relative;
    }
    
    .provider-card {
      transition: all 0.3s ease;
      position: relative;
    }
    .provider-card:hover {
      transform: scale(1.05) translateY(-8px);
    }
    .provider-card .glow-effect {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .provider-card:hover .glow-effect {
      opacity: 1;
    }
    .provider-card .icon-rotate {
      transition: transform 0.6s ease;
    }
    .provider-card:hover .icon-rotate {
      transform: rotate(360deg);
    }
    .hover-content {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }
    .provider-card:hover .hover-content {
      max-height: 200px;
      opacity: 1;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    @keyframes pulseScale {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    .animate-fade-in-up {
      animation: fadeInUp 0.8s ease forwards;
    }
    .animate-fade-in {
      animation: fadeIn 0.8s ease forwards;
    }
    .animate-scale-in {
      animation: scaleIn 0.4s ease forwards;
    }
    .animate-pulse-scale {
      animation: pulseScale 2s ease infinite;
    }
  </style>
</head>
<body>
  <div id="sl-wrapper">
    <div id="sl-stage">
      <!-- Main Content -->
      <div class="w-[1920px] h-[1080px] bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 overflow-hidden relative">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0 bg-cover bg-center" style="background-image: url('https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/new1%29.png'); opacity: 0.15;"></div>

        <!-- Animated background elements -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none z-[1]">
          <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/5 rounded-full blur-3xl"></div>
          <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/5 rounded-full blur-3xl"></div>
          <div class="absolute top-1/2 right-1/3 w-96 h-96 bg-blue-500/5 rounded-full blur-3xl"></div>
        </div>

        <div class="w-full h-full px-12 py-8 relative z-10 overflow-hidden">
          <!-- Header -->
          <div class="text-center mb-8 animate-fade-in-up">
            <h1 class="mb-3 text-[48px] text-white font-bold">
              Fiber Optics Providers
            </h1>
            
            <div class="mb-3 flex justify-center animate-fade-in" style="animation-delay: 0.3s; opacity: 0;">
              <img 
                src="https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/Screenshot%202026-02-24%20134104.png"
                alt="Service Territory"
                class="max-w-[600px] h-auto"
                style="margin-left: -80px; margin-right: -5px;"
              />
            </div>
            
            <div class="inline-flex items-center gap-2 bg-slate-800/50 backdrop-blur-sm text-cyan-300 px-4 py-2 rounded-full text-sm border border-cyan-500/30 animate-fade-in" style="animation-delay: 0.5s; opacity: 0;">
              <div class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse-scale"></div>
              <span>Hover to explore provider details</span>
            </div>
          </div>

          <!-- Provider Grid -->
          <div id="provider-grid" class="grid grid-cols-5 gap-4 mb-6 max-w-[1800px] mx-auto">
            <!-- Cards will be generated by JavaScript -->
          </div>

          <!-- Important Notice -->
          <div class="relative rounded-2xl overflow-hidden max-w-[1800px] mx-auto animate-fade-in" style="animation-delay: 1s; opacity: 0;">
            <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/10 to-blue-500/10 backdrop-blur-sm"></div>
            <div class="relative border border-cyan-500/30 rounded-2xl p-4">
              <div class="flex items-start gap-3">
                <div class="flex-shrink-0">
                  <div class="p-2 bg-cyan-500/20 rounded-xl">
                    <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <circle cx="12" cy="12" r="10" stroke-width="2"></circle>
                      <line x1="12" y1="16" x2="12" y2="12" stroke-width="2" stroke-linecap="round"></line>
                      <circle cx="12" cy="8" r="0.5" fill="currentColor" stroke="none"></circle>
                    </svg>
                  </div>
                </div>
                <div>
                  <h3 class="font-semibold text-cyan-300 mb-1 text-[18px]">Service Territory Information</h3>
                  <p class="text-slate-300 leading-relaxed text-[20px]">
                    All listed providers maintain active fiber optic infrastructure within the SDGND service territory. 
                    For specific coverage areas and service availability, please contact individual providers directly.
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Lucide icons as SVG strings
    const icons = {
      building: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" ry="2" stroke-width="2"></rect><path d="M9 22v-4h6v4M8 6h.01M16 6h.01M12 6h.01M12 10h.01M8 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01" stroke-width="2" stroke-linecap="round"></path></svg>`,
      radio: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="2" stroke-width="2"></circle><path d="M4.93 4.93l4.24 4.24M14.83 14.83l4.24 4.24M14.83 9.17l4.24-4.24M14.83 9.17l-4.24-4.24M4.93 19.07l4.24-4.24" stroke-width="2" stroke-linecap="round"></path></svg>`,
      network: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="16" y="16" width="6" height="6" rx="1" stroke-width="2"></rect><rect x="2" y="16" width="6" height="6" rx="1" stroke-width="2"></rect><rect x="9" y="2" width="6" height="6" rx="1" stroke-width="2"></rect><path d="M12 8v8M19 16V8a1 1 0 0 0-1-1h-4M5 16V8a1 1 0 0 1 1-1h4" stroke-width="2" stroke-linecap="round"></path></svg>`,
      check: `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"></circle><path d="M9 12l2 2 4-4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>`
    };

    const providers = [
      { name: 'City of Encinitas', category: 'municipal' },
      { name: 'City of San Diego', category: 'municipal' },
      { name: 'Cityside Fiber', category: 'fiber', imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/cityside_fiber_logo.jpg' },
      { name: 'Crown Castle', category: 'telecom', aliases: ['Freedom', 'NextG', 'NewPath', 'Sunesys'], imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/Crown_Castle_Logo.svg.png' },
      { name: 'Intrepid', category: 'fiber', imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/Bigger_IFN_Logo.jpg' },
      { name: 'LA Cellular', category: 'telecom', imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/social-1757621835055-A%20(1).png' },
      { name: 'Level 3', category: 'telecom', aliases: ['Time Warner ASX'], imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/level-3-communications-logo-png-transparent.png' },
      { name: 'SDG&E Fiber/Sempra Telecom', category: 'fiber', imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/SDGE_Logo_White_Storyline.png' },
      { name: 'Teleport Communications Group', category: 'telecom' },
      { name: 'Time Warner ASX', category: 'telecom', imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/Time_Warner_Cable_logo_800x315.png' },
      { name: 'TPX', category: 'telecom', aliases: ['TelePacific'], imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/Tpx_comm-removebg-preview.png' },
      { name: 'Ubiquity', category: 'fiber', aliases: ['Netly'], imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/UBIQUITY_Logo.jpg' },
      { name: 'Verizon Business', category: 'telecom', aliases: ['MCI'], imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/Verizon-New-Logo.webp' },
      { name: 'XO Communications', category: 'telecom', aliases: ['Now Verizon Business'], imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/XO_Communications_logo.svg.png' },
      { name: 'Zito West', category: 'fiber', aliases: ['USA Cable', 'Julian Cable'], imageUrl: 'https://raw.githubusercontent.com/pushkapatrick-design/fiber-optics-providers/main/166a4400-ae7a-45db-940e-7adcbeb4cc17.png' }
    ];

    const getCategoryConfig = (category) => {
      const configs = {
        municipal: {
          icon: icons.building,
          gradient: 'from-blue-500 to-blue-600',
          glow: 'bg-blue-500/20',
          border: 'border-blue-500/30',
          text: 'text-blue-400',
          label: 'MUNICIPAL'
        },
        telecom: {
          icon: icons.radio,
          gradient: 'from-purple-500 to-purple-600',
          glow: 'bg-purple-500/20',
          border: 'border-purple-500/30',
          text: 'text-purple-400',
          label: 'TELECOM'
        },
        fiber: {
          icon: icons.network,
          gradient: 'from-cyan-500 to-cyan-600',
          glow: 'bg-cyan-500/20',
          border: 'border-cyan-500/30',
          text: 'text-cyan-400',
          label: 'FIBER SPECIALIST'
        }
      };
      return configs[category];
    };

    const createProviderCard = (provider, index) => {
      const config = getCategoryConfig(provider.category);
      const largeLogos = ['SDG&E Fiber/Sempra Telecom', 'Level 3'];
      const isLargeLogo = largeLogos.includes(provider.name);
      
      const card = document.createElement('div');
      card.className = 'provider-card animate-scale-in';
      card.style.animationDelay = `${index * 0.05}s`;
      card.style.opacity = '0';
      
      card.innerHTML = `
        <div class="relative rounded-2xl overflow-hidden backdrop-blur-sm bg-gradient-to-br from-slate-800/70 to-slate-900/70 border ${config.border}">
          <div class="glow-effect absolute inset-0 rounded-2xl blur-xl ${config.glow}"></div>
          
          <div class="relative z-10">
            <div class="flex items-center justify-center bg-slate-900/30 border-b border-slate-700/50 ${isLargeLogo ? 'h-28' : 'h-20'}">
              ${provider.imageUrl ? `
                <img 
                  src="${provider.imageUrl}" 
                  alt="${provider.name}"
                  class="w-full h-full object-contain ${isLargeLogo ? 'p-0' : 'p-3'}"
                />
              ` : `
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br ${config.gradient} flex items-center justify-center">
                  ${config.icon.replace('class="w-5 h-5"', 'class="w-7 h-7 text-white"')}
                </div>
              `}
            </div>
            
            <div class="p-4">
              <div class="flex items-start justify-between mb-3">
                <div class="icon-rotate p-2 rounded-xl ${config.glow}">
                  ${config.icon.replace('currentColor', config.text.replace('text-', ''))}
                </div>
                
                <div class="flex items-center gap-1 px-2 py-1 ${config.glow} rounded-full border ${config.border}">
                  ${icons.check.replace('currentColor', config.text.replace('text-', ''))}
                  <span class="text-xs ${config.text} font-medium">${config.label}</span>
                </div>
              </div>
              
              <h3 class="font-semibold text-white mb-1 text-[18px] min-h-[3rem] flex items-center">
                ${provider.name}
              </h3>
              
              ${provider.aliases && provider.aliases.length > 0 ? `
                <div class="hover-content">
                  <div class="pt-3 border-t ${config.border}">
                    <p class="text-base text-slate-300 mb-2">
                      Also known as: <span class="${config.text}">${provider.aliases.join(', ')}</span>
                    </p>
                  </div>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;
      
      return card;
    };

    // Render provider cards
    const grid = document.getElementById('provider-grid');
    providers.forEach((provider, index) => {
      grid.appendChild(createProviderCard(provider, index));
    });

    // Responsive scaling for Storyline
    function scaleToFit() {
      const wrapper = document.getElementById('sl-wrapper');
      const stage = document.getElementById('sl-stage');
      
      const wrapperWidth = wrapper.offsetWidth;
      const wrapperHeight = wrapper.offsetHeight;
      
      const stageWidth = 1920;
      const stageHeight = 1080;
      
      const scaleX = wrapperWidth / stageWidth;
      const scaleY = wrapperHeight / stageHeight;
      const scale = Math.min(scaleX, scaleY);
      
      stage.style.transform = `scale(${scale})`;
    }

    // Initial scale
    window.addEventListener('load', () => {
      scaleToFit();
      
      // Trigger animations
      setTimeout(() => {
        document.querySelectorAll('.animate-fade-in, .animate-scale-in').forEach(el => {
          el.style.opacity = '1';
        });
      }, 100);
    });

    // Watch for resize
    if (window.ResizeObserver) {
      const resizeObserver = new ResizeObserver(() => {
        scaleToFit();
      });
      resizeObserver.observe(document.getElementById('sl-wrapper'));
    } else {
      window.addEventListener('resize', scaleToFit);
    }
  </script>
</body>
</html>
